spring.application.name=api-gateway
server.port=8090

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

spring.cloud.gateway.server.webmvc.routes[0].id=orders-service
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://ORDERS-SERVICE
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/api/pedidos/**

spring.cloud.gateway.server.webmvc.routes[1].id=users-service
spring.cloud.gateway.server.webmvc.routes[1].uri=lb://USERS-SERVICE
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/api/usuarios/**

spring.cloud.gateway.server.webmvc.routes[2].id=products-service
spring.cloud.gateway.server.webmvc.routes[2].uri=lb://PRODUCTS-SERVICE
spring.cloud.gateway.server.webmvc.routes[2].predicates[0]=Path=/api/productos/**